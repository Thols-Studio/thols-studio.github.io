<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TholsStudio — Your YouTube Collections</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23F5C518'/><polygon points='13,10 13,22 23,16' fill='%23111'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F14;
    --surface: #1A1A24;
    --surface-hover: #252535;
    --surface-raised: #2D2D40;
    --border: #2A2A3E;
    --border-subtle: #1F1F2E;
    --text: #F0F0FF;
    --text-muted: #7A7A9A;
    --text-dim: #4A4A6A;
    --red: #FF3040;
    --indigo: #5C6BC0;
    --indigo-bright: #7986CB;
    --indigo-glow: rgba(92,107,192,0.15);
    --green: #4CAF7D;
    --amber: #FFA726;
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 52px;
    background: #0A0A10;
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }
  .logo-icon {
    width: 26px; height: 26px;
    background: var(--red);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 14px; height: 14px; fill: white; }
  .search-bar {
    flex: 1;
    max-width: 480px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 12px 6px 34px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--indigo); }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-bar .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm);
    border: none; cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-primary { background: var(--indigo); color: white; }
  .btn-primary:hover { background: var(--indigo-bright); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface); color: var(--text); }
  .btn-danger { background: var(--red); color: white; border: none; }
  .btn-danger:hover { background: #ff4d4d; }
  .btn-icon {
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 6px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .btn-icon:hover { background: var(--surface); color: var(--text); }

  /* ── EXPORT DROPDOWN ── */
  .export-dropdown {
    position: relative;
  }
  .export-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 190px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    z-index: 300;
    overflow: hidden;
    padding: 4px;
  }
  .export-menu.open { display: block; }
  .export-menu-item {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 12px;
    font-family: var(--font);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
  }
  .export-menu-item:hover { background: var(--surface); }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w, 220px);
    min-width: 160px;
    max-width: 380px;
    background: #0A0A10;
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    padding: 12px 0;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    transition: none;
  }
  /* Resize handle strip */
  .sidebar-resizer {
    position: absolute;
    top: 0; right: 0;
    width: 5px; height: 100%;
    cursor: col-resize;
    z-index: 50;
    background: transparent;
    transition: background 0.2s;
  }
  .sidebar-resizer:hover,
  .sidebar-resizer.dragging { background: var(--indigo); opacity: 0.5; }

  .sidebar-section { padding: 0 8px 8px; }
  .sidebar-label {
    font-size: 10px; font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 8px 8px;
    font-family: var(--mono);
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    margin-bottom: 6px;
    border-radius: var(--radius-sm);
    cursor: pointer; font-size: 12px; color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
    border: none; background: transparent; width: 100%; text-align: left;
    position: relative; overflow: hidden; min-width: 0;
  }
  .sidebar-item:hover { background: var(--surface); color: var(--text); }
  .sidebar-item.active { background: var(--indigo-glow); color: var(--indigo-bright); }
  /* SVG icons in library items — fixed 14px slot so text aligns with collection items */
  .sidebar-item > svg { width: 14px; height: 14px; flex-shrink: 0; }
  /* collection color — circle, same 14px as icon slot */
  .collection-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  /* name truncates cleanly */
  .col-name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* count badge — circle, pushed to far right */
  .sidebar-item .count {
    min-width: 22px; height: 22px;
    font-size: 11px; font-weight: 600;
    font-family: var(--mono);
    color: var(--text-muted);
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-left: auto;
    padding: 0 4px;
    letter-spacing: 0;
    visibility: visible;
  }
  /* zero-count: hide the circle but keep space so layout doesn't shift */
  .sidebar-item .count.count-empty { visibility: hidden; }
  .sidebar-item.active .count {
    background: rgba(92,107,192,0.3);
    color: var(--indigo-bright);
    border-color: rgba(92,107,192,0.4);
  }
  /* hide count on hover, and whenever the item is active — action buttons take its place instead */
  .sidebar-item:hover .count { visibility: hidden; }
  .sidebar-item.active .count { visibility: hidden; }
  .sidebar-divider {
    height: 1px; background: var(--border-subtle); margin: 6px 16px 9px;
  }

  /* ── COLLAPSIBLE SIDEBAR SECTIONS ── */
  .sidebar-label-toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
    border-radius: var(--radius-sm);
    transition: color 0.15s;
  }
  .sidebar-label-toggle:hover { color: var(--text-muted); }
  .section-chev {
    flex-shrink: 0; opacity: 0.5;
    transition: transform 0.2s;
  }
  .section-chev.chev-up { transform: rotate(0deg); }
  .section-chev.chev-down { transform: rotate(180deg); }
  .section-collapsed { display: none; }

  /* ── PLAYLIST PICKER (floating) ── */
  .playlist-picker {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    padding: 4px;
    min-width: 170px;
  }
  .playlist-picker-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-dim);
    padding: 6px 8px 4px; font-family: var(--mono);
  }
  .playlist-picker-item {
    display: flex; align-items: center; gap: 7px;
    width: 100%; text-align: left;
    background: transparent; border: none;
    color: var(--text-dim); font-size: 12px; font-family: var(--font);
    padding: 7px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .playlist-picker-item:hover { background: var(--surface); color: var(--text); }
  /* checked state: bright white text + visible tick */
  .playlist-picker-item.in-playlist { color: var(--text); }
  .playlist-picker-item .pp-check { color: var(--text-dim); opacity: 0.25; }
  .playlist-picker-item.in-playlist .pp-check { color: #fff; opacity: 1; }
  .add-collection-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 12px; color: var(--text-dim);
    width: 100%; border: 1px dashed var(--border);
    background: transparent; transition: all 0.15s; font-family: var(--sans);
    margin-top: 3px;
  }
  .add-collection-btn:hover { color: var(--indigo-bright); border-color: var(--indigo); }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
  }
  .section-title {
    font-size: 18px; font-weight: 600;
    color: var(--text);
  }
  .section-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .section-header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }
  .view-toggle {
    display: flex; gap: 2px;
    background: var(--surface);
    padding: 3px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .view-btn {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 4px 7px; border-radius: 4px;
    transition: all 0.15s;
    display: flex; align-items: center;
  }
  .view-btn.active { background: var(--surface-raised); color: var(--text); }
  .view-btn:hover:not(.active) { color: var(--text-muted); }

  /* ── ADD URL LOCATION LABEL ── */
  .add-url-location {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    padding: 0 4px;
    margin-bottom: -8px;
  }
  .add-url-location-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  /* ── ADD URL BAR ── */
  .add-url-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; gap: 10px; align-items: center;
    transition: border-color 0.2s;
  }
  .add-url-bar:focus-within { border-color: var(--indigo); }
  .add-url-bar input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
  }
  .add-url-bar input::placeholder { color: var(--text-dim); }

  /* ── CARDS GRID ── */
  .cards-grid-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .cards-grid.list-view {
    grid-template-columns: 1fr;
  }

  /* ── VIDEO CARD ── */
  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
    position: relative;
  }
  .video-card:hover { border-color: var(--indigo); transform: translateY(-1px); }
  .video-card.list-view {
    display: flex; flex-direction: row;
  }

  .card-thumb {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--bg);
    overflow: hidden;
  }
  .list-view .card-thumb {
    width: 200px;
    aspect-ratio: unset;
    height: 120px;
    flex-shrink: 0;
  }
  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .card-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    color: var(--text-dim);
  }
  .card-duration {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.82);
    color: white;
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .card-play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    transition: background 0.2s;
  }
  .card-thumb:hover .card-play-overlay { background: rgba(0,0,0,0.45); }
  .play-btn {
    width: 40px; height: 40px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.2s, transform 0.2s;
    text-decoration: none;
  }
  .card-thumb:hover .play-btn { opacity: 1; transform: scale(1); }
  .play-btn svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

  .card-body {
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .card-collection-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
  .card-title-row {
    display: flex; align-items: flex-start; gap: 4px;
  }
  .card-title {
    font-size: 13px; font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1; cursor: pointer;
    min-width: 0;
  }
  .card-title:hover { color: var(--indigo-bright); }
  .card-title-edit-btn {
    display: none;
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 2px; flex-shrink: 0;
    border-radius: 3px;
    transition: color 0.15s;
    margin-top: 1px;
  }
  .card-title-edit-btn:hover { color: var(--indigo-bright); }
  .video-card:hover .card-title-edit-btn { display: flex; align-items: center; }
  .title-edit-input {
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--indigo);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px; font-weight: 500;
    font-family: var(--font);
    padding: 2px 6px;
    outline: none;
  }
  .card-channel {
    font-size: 11px;
    color: var(--text-muted);
  }
  .card-note {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface-raised);
    border-left: 2px solid var(--indigo);
    padding: 5px 8px;
    border-radius: 0 4px 4px 0;
    font-style: italic;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 2px;
  }
  .card-date {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-dim);
    margin-left: auto;
  }
  .card-actions {
    display: flex; gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .video-card:hover .card-actions { opacity: 1; }
  .card-action-btn {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 3px 5px; border-radius: 4px;
    font-size: 11px;
    transition: background 0.15s, color 0.15s;
    display: flex; align-items: center;
  }
  .card-action-btn:hover { background: var(--surface-raised); color: var(--text); }
  .card-action-btn.danger:hover { background: rgba(255,48,64,0.15); color: var(--red); }

  /* ── NOTE EDIT AREA ── */
  .note-edit {
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--indigo);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 6px 8px;
    resize: none;
    outline: none;
    line-height: 1.4;
    display: none;
  }
  .note-edit.visible { display: block; }

  /* ── GROUP SECTION ── */
  .group-section { display: flex; flex-direction: column; gap: 6px; }
  .group-header {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
  }
  /* Collection-level header: simpler, no stacked actions row — keep vertically centered */
  .group-header--collection {
    align-items: center;
  }
  .group-header:hover .group-title { color: var(--text); }
  .group-chevron {
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
    display: flex; align-items: center;
    margin-top: 2px;
  }
  .group-header--collection .group-chevron { margin-top: 0; }
  .group-chevron.collapsed { transform: rotate(-90deg); }
  /* Wrapper column: title row + actions row stacked */
  .group-title-wrap {
    display: flex; flex-direction: column; gap: 3px;
    min-width: 0; flex: 1;
  }
  .group-title-row {
    display: flex; align-items: center; gap: 8px;
  }
  .group-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .group-count {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-dim);
    background: var(--surface-raised);
    padding: 1px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .group-header-line {
    flex: 1;              /* group line — stretches to fill, but stops a bit short */
    height: 1px;
    background: var(--border-subtle);
    flex-shrink: 0;
    margin-right: 32px;   /* group line ends slightly before the edge */
  }
  .group-header-line--collection {
    margin-right: 0;      /* collection line runs all the way to the edge */
  }
  /* Icon row — always reserves space, just invisible until hover */
  .group-header-actions {
    display: flex; gap: 1px;
    visibility: hidden;
    transition: visibility 0s;
  }
  .group-header:hover .group-header-actions {
    visibility: visible;
  }
  .group-action-btn {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 3px 4px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .group-action-btn:hover { background: var(--surface-raised); color: var(--text); }
  .group-action-btn.danger:hover { background: rgba(255,48,64,0.1); color: var(--red); }
  .group-body { display: flex; flex-direction: column; gap: 10px; }
  .group-body.collapsed { display: none; }
  .group-body .cards-grid { margin: 0; }
  .add-group-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0 2px;
  }
  .add-group-input {
    background: var(--surface);
    border: 1px solid var(--indigo);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
    flex: 1;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .add-group-input::placeholder { color: var(--text-dim); text-transform: none; letter-spacing: 0; }
  .ungrouped-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .ungrouped-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 64px 32px;
    text-align: center;
    color: var(--text-dim);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    grid-column: 1 / -1;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 13px; max-width: 260px; line-height: 1.5; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    display: flex; flex-direction: column; gap: 18px;
    transform: translateY(10px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-size: 16px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-close {
    margin-left: auto;
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 4px; border-radius: 4px;
    font-size: 18px; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .field input, .field select, .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--indigo); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
  .field select option { background: var(--surface); }
  .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .color-picker-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .color-chip {
    width: 24px; height: 24px;
    border-radius: 4px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .color-chip.selected { border-color: white; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px; color: var(--text);
    z-index: 999;
    display: flex; align-items: center; gap: 8px;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── SIDEBAR DRAG AND DROP ── */
  .sidebar-item.draggable { cursor: pointer; }
  .sidebar-item.dragging { opacity: 0.35; background: var(--surface) !important; cursor: grabbing; }
  .sidebar-item.drag-over-top { border-top: 2px solid var(--indigo-bright); margin-top: -2px; }
  .sidebar-item.drag-over-bottom { border-bottom: 2px solid var(--indigo-bright); margin-bottom: -2px; }

  /* Absolutely positioned — completely out of flex flow.
     Dot + text now start at same X as Library svg icons. */
  .drag-handle {
    position: absolute;
    left: 5px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.18s, color 0.18s;
    display: flex; align-items: center;
    cursor: grab;
    padding: 2px 3px;
    border-radius: 3px;
    z-index: 2;
  }
  .sidebar-item:hover .drag-handle { opacity: 1; }
  .drag-handle:hover { color: var(--indigo-bright) !important; background: var(--surface-raised); }
  .sidebar-item.dragging .drag-handle { opacity: 0.4; cursor: grabbing; }

  /* ── COLLECTION ITEM CONTEXT ACTIONS ── */
  .col-actions {
    display: flex; align-items: center; gap: 1px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    position: absolute;
    right: 8px; top: 50%; transform: translateY(-50%);
  }
  .sidebar-item:hover .col-actions { opacity: 1; }
  .sidebar-item.active .col-actions { opacity: 1; }
  /* hide count circle on hover — show action buttons instead (use visibility to avoid layout shift) */
  .col-action-btn {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    padding: 2px 4px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s;
  }
  .col-action-btn:hover { background: var(--surface-raised); color: var(--text); }
  .col-action-btn.danger:hover { background: rgba(255,48,64,0.12); color: var(--red); }

  /* Inline rename input inside sidebar */
  .col-rename-wrap {
    display: flex; align-items: center; gap: 4px;
    flex: 1; min-width: 0;
  }
  .col-rename-input {
    background: var(--bg);
    border: 1px solid var(--indigo);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 2px 6px;
    outline: none;
    width: 100%;
    min-width: 0;
  }
  .col-rename-confirm {
    background: var(--indigo); border: none;
    color: white; cursor: pointer;
    padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-family: var(--sans);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .col-rename-confirm:hover { background: var(--indigo-bright); }

  /* ── NEW COLLECTION INLINE ── */
  .new-collection-input {
    background: var(--surface);
    border: 1px solid var(--indigo);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    width: 100%;
    margin: 4px 8px;
    width: calc(100% - 16px);
  }

  /* ── PLAYLIST PLAYER BAR ── */
  .playlist-player-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: var(--surface-raised);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 500;
    backdrop-filter: blur(16px);
    box-shadow: 0 -6px 24px rgba(0,0,0,0.35);
  }

  /* Left — playlist + current video name */
  .ppb-left {
    display: flex; align-items: center; gap: 10px;
    min-width: 0; flex: 1;
  }
  .ppb-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }
  .ppb-info {
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .ppb-playlist-name {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ppb-video-title {
    font-size: 12px; font-weight: 500;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 260px;
  }

  /* Centre — mode + controls */
  .ppb-centre {
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }

  /* Mode selector group */
  .ppb-mode-group {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px;
    gap: 2px;
  }
  .ppb-mode-btn {
    display: flex; align-items: center; gap: 5px;
    background: transparent; border: none;
    color: var(--text-dim);
    font-size: 11px; font-family: var(--font);
    padding: 4px 10px;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .ppb-mode-btn:hover { color: var(--text); }
  .ppb-mode-btn.active {
    background: var(--indigo);
    color: #fff;
  }
  .ppb-mode-btn.active:hover { background: var(--indigo-bright); }

  /* Playback controls */
  .ppb-controls {
    display: flex; align-items: center; gap: 4px;
  }
  .ppb-btn {
    background: transparent; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 6px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .ppb-btn:hover { background: var(--surface); color: var(--text); }
  .ppb-play {
    background: var(--indigo);
    color: #fff !important;
    width: 34px; height: 34px;
    border-radius: 50%;
    padding: 0;
  }
  .ppb-play:hover { background: var(--indigo-bright) !important; }

  /* Right — counter + close */
  .ppb-right {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .ppb-track {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    min-width: 36px;
    text-align: right;
  }
  .ppb-close { color: var(--text-dim); }

  /* Push main content up when bar is visible */
  .main.has-player-bar { padding-bottom: 68px; }

  /* Currently playing card highlight */
  .video-card.pp-active {
    box-shadow: 0 0 0 2px var(--indigo);
    outline: none;
  }
  .video-card.pp-active .card-play-overlay { opacity: 1; }

  /* ── PLAYLIST SPLIT VIEW ── */
  .playlist-view {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left panel — track list */
  .pv-list {
    width: 320px;
    min-width: 260px;
    max-width: 360px;
    background: #0A0A10;
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .pv-list-header {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
  }
  .pv-list-meta {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .pv-list-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .pv-list-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pv-list-count {
    font-size: 10px; color: var(--text-dim); font-family: var(--mono);
    margin-top: 2px;
  }
  .pv-list-modes {
    display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px;
  }
  .pv-mode-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-dim); padding: 4px 7px;
    border-radius: 4px;
    display: flex; align-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .pv-mode-btn:hover { color: var(--text); }
  .pv-mode-btn.active { background: var(--indigo); color: #fff; }

  /* Track list */
  .pv-tracks {
    flex: 1; overflow-y: auto;
    padding: 6px 0;
  }
  .pv-track {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 2px solid transparent;
    min-width: 0;
  }
  .pv-track:hover { background: var(--surface); }
  .pv-track.active {
    background: var(--indigo-glow);
    border-left-color: var(--indigo-bright);
  }
  .pv-track-num {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-dim); width: 18px; text-align: right;
    flex-shrink: 0;
  }
  .pv-track.active .pv-track-num {
    display: none;
  }
  .pv-track-play-icon {
    display: none;
    width: 18px; flex-shrink: 0;
    color: var(--indigo-bright);
  }
  .pv-track.active .pv-track-play-icon { display: flex; align-items: center; }
  .pv-track-thumb {
    width: 56px; height: 36px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface-raised);
    flex-shrink: 0;
  }
  .pv-track-info {
    flex: 1; min-width: 0;
  }
  .pv-track-title {
    font-size: 12px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.3;
  }
  .pv-track.active .pv-track-title { color: var(--indigo-bright); }
  .pv-track-path {
    font-size: 10px; color: var(--text-dim); font-family: var(--mono);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }

  /* Right panel — iframe */
  .pv-player {
    flex: 1; position: relative;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .pv-player iframe {
    width: 100%; height: 100%;
    border: none; display: block;
  }
  .pv-close-btn {
    position: absolute; top: 48px; right: 14px;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    backdrop-filter: blur(8px);
  }
  .pv-close-btn:hover { background: rgba(255,255,255,0.15); }

  /* ── CARD DRAG-AND-DROP ── */
  .video-card[draggable="true"] { cursor: grab; }
  .video-card[draggable="true"]:active { cursor: grabbing; }
  .video-card.card-dragging {
    opacity: 0.4;
    outline: 2px dashed var(--indigo);
    outline-offset: 2px;
  }
  .video-card.card-drag-over {
    outline: 2px solid var(--indigo-bright);
    outline-offset: 2px;
    background: var(--indigo-glow);
  }

  /* ── LOCATION BROWSE BUTTON & PICKER ── */
  .browse-location-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 6px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .browse-location-btn:hover { background: var(--surface-raised); color: var(--indigo-bright); }

  .location-picker {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 260px;
    max-height: 320px;
    overflow-y: auto;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    z-index: 400;
    padding: 6px 0;
  }
  .location-picker-title {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 4px 12px 8px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 4px;
  }
  .lp-collection {
    padding: 0;
  }
  .lp-col-header {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    font-size: 12px; font-weight: 500; color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
  }
  .lp-col-header:hover { background: var(--surface); }
  .lp-col-header.selected { color: var(--indigo-bright); background: var(--indigo-glow); }
  .lp-col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lp-group-item {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px 5px 28px;
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
    cursor: pointer;
    transition: background 0.12s;
  }
  .lp-group-item:hover { background: var(--surface); color: var(--text); }
  .lp-group-item.selected { color: var(--indigo-bright); background: var(--indigo-glow); }
  .lp-uncollected {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
    cursor: pointer;
    border-top: 1px solid var(--border-subtle);
    margin-top: 4px;
    transition: background 0.12s;
  }
  .lp-uncollected:hover { background: var(--surface); color: var(--text); }
  .lp-uncollected.selected { color: var(--indigo-bright); background: var(--indigo-glow); }

  /* ── EXPORT MENU DIVIDER + ALL ── */
  .export-menu-divider {
    height: 1px; background: var(--border-subtle);
    margin: 4px 0;
  }
  .export-menu-item-all {
    display: flex; align-items: center; gap: 6px;
    color: var(--indigo-bright) !important;
    font-weight: 500;
  }
  .export-menu-item-all:hover { background: var(--indigo-glow) !important; }

  /* ── EXPORT FOLDER LOCATION LABEL ── */
  .export-location-wrap {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 8px;
    max-width: 220px;
    min-width: 0;
  }
  .export-location-wrap svg { flex-shrink: 0; color: var(--indigo-bright); }
  #exportLocationLabel {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .export-location-clear {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 13px; line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .export-location-clear:hover { color: var(--text); }

  /* Autoplay label in playlist header */
  .pv-autoplay-label {
    font-size: 9px; font-family: var(--mono);
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; margin-top: 1px;
  }

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.27 8.27 0 004.84 1.55V6.79a4.85 4.85 0 01-1.07-.1z"/></svg>
    </div>
    TholsStudio
  </div>
  <div class="search-bar">
    <span class="search-icon">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </span>
    <input type="text" placeholder="Search videos, channels, notes…" id="searchInput" oninput="handleSearch()">
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="openImportModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Import
    </button>
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Video
    </button>
  </div>
</div>

<!-- APP BODY -->
<div class="app-body">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-resizer" id="sidebarResizer" title="Drag to resize · Double-click to reset"></div>
    <div class="sidebar-section">
      <div class="sidebar-label sidebar-label-toggle" onclick="toggleSidebarSection('librarySection', this.querySelector('.section-chev'))">
        Library
        <svg class="section-chev chev-up" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
      <div id="librarySection">
      <button class="sidebar-item active" onclick="filterByCollection('all', this)">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>

<script>

// Edit this file to change the default collections, colors, and

//
// STRUCTURE — easy to browse/edit in any JSON editor:
//   DEFAULT_COLLECTIONS
//     └─ collection (e.g. "Unity Tutorials")
//          ├─ groups: { "Character Movement": [ ...videos ], "Performance": [ ...videos ] }
//          └─ ungrouped: [ ...videos ]   (videos with no sub-group)
//
// This only affects FIRST LOAD — once the app has saved data to
// localStorage, this file is ignored. To reset and re-apply your
// changes, clear the site's localStorage (or use a private window).
// ──────────────────────────────────────────────────────────────

// Color swatches offered in the "New Collection" color picker.

  '#5C6BC0', '#EF5350', '#26A69A', '#FFA726',

  '#78909C', '#EC407A'
];

//
// Each collection:
// - id:        unique, lowercase, no spaces (used internally)
// - name:      display name shown in the sidebar
// - color:     hex color for the collection's dot / accent
// - groups:    { "Group Name": [ video, video, ... ], ... }
//              — each key becomes a sub-section inside the collection
// - ungrouped: [ video, video, ... ] — videos with no sub-group
//
// Each video:
// - url:        full YouTube URL (watch, youtu.be, or shorts link)
// - videoId:    the 11-character YouTube video ID
// - title:      display title
// - channel:    channel name (optional)
// - note:       personal note shown on the card (optional)
// - playlistId: optional — if the original URL had a "?list=" param,
//               the play button will open it within that playlist
const DEFAULT_COLLECTIONS = [
  {
    id: 'unity',
    name: 'Unity Tutorials',
    color: '#5C6BC0',
    groups: {
      'Character Movement': [
        {
          url: 'https://www.youtube.com/watch?v=XtQMytORBmM',
          videoId: 'XtQMytORBmM',
          title: 'Unity Character Controller from Scratch',
          channel: 'Brackeys',
          note: 'Great foundation for the platformer project. Check timestamp 12:30 for slope handling.'
        }
      ],
      'Performance': [
        {
          url: 'https://www.youtube.com/watch?v=vFWnv9aRhT8',
          videoId: 'vFWnv9aRhT8',
          title: 'Unity Mobile Performance Deep Dive',
          channel: 'Unity',
          note: ''
        }
      ],
      'Physics': [
        {
          url: 'https://www.youtube.com/watch?v=bFOAipGJGA0',
          videoId: 'bFOAipGJGA0',
          title: 'Unity Physics — Rigidbody & Colliders',
          channel: 'Unity',
          note: 'Revisit for slope controller refactor'
        }
      ]
    },
    ungrouped: []
  },
  {
    id: 'gamedesign',

function extractVideoId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) {
      // e.g. https://youtu.be/fjOdtSu4Lm4?list=PLxxxx
      const id = u.pathname.slice(1).split('/')[0];
      if (/^[A-Za-z0-9_-]{11}$/.test(id)) return id;
    }
    if (u.hostname.includes('youtube.com')) {
      if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2];
      // e.g. https://www.youtube.com/watch?v=fjOdtSu4Lm4&list=PLxxxx
      const v = u.searchParams.get('v');
      if (v) return v;
    }
  } catch {}
  // fallback regex — handles v=, youtu.be/, or shorts/ followed by an 11-char ID
  const m = url.match(/(?:v=|youtu\.be\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

// Extracts the playlist ID from a "list=" query param, if present
// (works for both youtube.com/watch?...&list=... and youtu.be/<id>?list=...)
function extractPlaylistId(url) {
  try {
    const u = new URL(url);
    const list = u.searchParams.get('list');
    if (list) return list;
  } catch {}
  // fallback regex
  const m = url.match(/[?&]list=([A-Za-z0-9_-]+)/);
  return m ? m[1] : null;
}

function getThumbnail(videoId) {
  return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
}

function getWatchUrl(videoId, playlistId) {
  return playlistId
    ? `https://www.youtube.com/watch?v=${videoId}&list=${playlistId}`
    : `https://www.youtube.com/watch?v=${videoId}`;
}

function isYouTubeUrl(url) {
  return url && (url.includes('youtube.com') || url.includes('youtu.be'));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

let dragSrcIndex = null;

function renderSidebar() {

          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="col-action-btn" title="Rename" onclick="startRename(event,'${col.id}')">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>

        </button>
      </span>
    `;

    // Click to filter (ignore if drag started)
    btn.addEventListener('click', (e) => {
      if (btn.classList.contains('was-dragging')) {
        btn.classList.remove('was-dragging');
        return;
      }
      filterByCollection(col.id, btn);
    });

    // ── Drag events ──
    btn.addEventListener('dragstart', (e) => {
      dragSrcIndex = index;
      btn.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', index);
      // Small delay so the drag ghost renders before opacity drops
      setTimeout(() => btn.classList.add('dragging'), 0);
    });

    btn.addEventListener('dragend', () => {
      btn.classList.remove('dragging');
      btn.classList.add('was-dragging');
      clearDropIndicators();
    });

    btn.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const targetIndex = parseInt(btn.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      clearDropIndicators();
      // Determine top/bottom half
      const rect = btn.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      if (e.clientY < midY) {
        btn.classList.add('drag-over-top');
      } else {
        btn.classList.add('drag-over-bottom');
      }
    });

    btn.addEventListener('dragleave', () => {
      btn.classList.remove('drag-over-top', 'drag-over-bottom');
    });

    btn.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      clearDropIndicators();
      const targetIndex = parseInt(btn.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;

      // Determine insert position
      const rect = btn.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      let insertAt = e.clientY < midY ? targetIndex : targetIndex + 1;

      // Reorder
      const moved = state.collections.splice(dragSrcIndex, 1)[0];
      if (insertAt > dragSrcIndex) insertAt--;
      state.collections.splice(insertAt, 0, moved);

      dragSrcIndex = null;
      save();
      renderSidebar();
      renderCards();
      showToast(`↕ "${moved.name}" reordered`);
    });

    list.appendChild(btn);
  });

  // Drop on the list container itself (drop below all items)
  list.addEventListener('dragover', (e) => e.preventDefault());
  list.addEventListener('drop', (e) => {
    // Only fires if not caught by a child item (i.e. dropped on empty space)
    if (dragSrcIndex === null) return;
    const moved = state.collections.splice(dragSrcIndex, 1)[0];
    state.collections.push(moved);
    dragSrcIndex = null;
    clearDropIndicators();
    save();
    renderSidebar();
    renderCards();
    showToast(`↕ "${moved.name}" moved to bottom`);
  });

  document.getElementById('count-all').textContent = state.videos.length;
  const now = Date.now();
  document.getElementById('count-recent').textContent = state.videos.filter(v => now - v.added < 7*24*3600*1000).length;
  document.getElementById('count-watched').textContent = state.videos.filter(v => v.watched).length;

  // Populate collection selects in modals
  ['addCollection', 'importCollection'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    sel.innerHTML = '<option value="">— No collection —</option>';
    state.collections.forEach(col => {
      sel.innerHTML += `<option value="${col.id}">${col.name}</option>`;
    });
    if (val) sel.value = val;
  });

  renderPlaylistsSidebar();
  renderQuickAddLocation();
}

function startRename(e, colId) {
  e.stopPropagation();
  const col = state.collections.find(c => c.id === colId);
  if (!col) return;

  // Find the sidebar item button
  const btn = document.querySelector(`[data-col-id="${colId}"]`);
  if (!btn) return;

  // Hide normal content, inject rename UI
  btn.innerHTML = `
    <span class="collection-dot" style="background:${col.color};flex-shrink:0;"></span>
    <span class="col-rename-wrap">
      <input class="col-rename-input" id="rename-input-${colId}"
        value="${escHtml(col.name)}"
        maxlength="40"
        onkeydown="handleRenameKey(event,'${colId}')"
        onblur="cancelRename('${colId}')">
      <button class="col-rename-confirm" onmousedown="confirmRename(event,'${colId}')">✓</button>
    </span>
  `;
  // Prevent dragging while renaming
  btn.draggable = false;

  const input = document.getElementById(`rename-input-${colId}`);
  input.focus();
  input.select();
}

function handleRenameKey(e, colId) {
  if (e.key === 'Enter') { e.preventDefault(); confirmRename(e, colId); }
  if (e.key === 'Escape') { cancelRename(colId); }
}

function confirmRename(e, colId) {
  e.stopPropagation?.();
  const input = document.getElementById(`rename-input-${colId}`);
  const newName = input ? input.value.trim() : '';
  if (!newName) { cancelRename(colId); return; }

  const col = state.collections.find(c => c.id === colId);
  if (col) {
    const old = col.name;
    col.name = newName;
    save();
    renderSidebar();
    renderCards();
    showToast(`✓ Renamed "${old}" → "${newName}"`);
  }
}

function cancelRename(colId) {
  // Just re-render — restores original state
  renderSidebar();
}

function deleteCollection(e, colId) {
  e.stopPropagation();
  const col = state.collections.find(c => c.id === colId);
  if (!col) return;
  const count = state.videos.filter(v => v.collection === colId).length;
  const msg = count > 0
    ? `"${col.name}" and its ${count} video${count !== 1 ? 's' : ''} will be permanently deleted.`
    : `"${col.name}" will be permanently deleted.`;
  showConfirm('Delete Collection', msg, 'Delete', () => {
    state.videos = state.videos.filter(v => v.collection !== colId);
    state.collections = state.collections.filter(c => c.id !== colId);
    if (currentFilter === colId) currentFilter = 'all';
    save(); renderSidebar(); renderCards();
    showToast(`✓ "${col.name}" deleted`);
  });
}

function getGroupsForCollection(colId) {
  if (!colId) return [];
  return [...new Set(
    state.videos
      .filter(v => v.collection === colId && v.group && v.group.trim())
      .map(v => v.group.trim())
  )].sort();
}

function refreshGroupSelect(collectionSelectId, groupSelectId) {
  const colId = document.getElementById(collectionSelectId)?.value;
  const sel = document.getElementById(groupSelectId);
  if (!sel) return;
  const groups = getGroupsForCollection(colId);
  sel.innerHTML = '<option value="">— No group —</option>';
  groups.forEach(g => { sel.innerHTML += `<option value="${g}">${g}</option>`; });
}

// ──────────────────────────────────────────────
function getFilteredVideos() {
  let vids = [...state.videos];
  const now = Date.now();

  if (currentFilter === 'all') { /* all */ }
  else if (currentFilter === 'recent') { vids = vids.filter(v => now - v.added < 7*24*3600*1000); }
  else if (currentFilter === 'watched') { vids = vids.filter(v => v.watched); }
  else if (currentFilter.startsWith('playlist:')) {
    const plId = currentFilter.slice(9);
    const pl = state.playlists.find(p => p.id === plId);
    vids = pl ? vids.filter(v => pl.videoIds.includes(v.id)) : [];
  }
  else { vids = vids.filter(v => v.collection === currentFilter); }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    vids = vids.filter(v =>
      (v.title||'').toLowerCase().includes(q) ||
      (v.channel||'').toLowerCase().includes(q) ||
      (v.note||'').toLowerCase().includes(q) ||
      (v.group||'').toLowerCase().includes(q) ||
      (v.url||'').toLowerCase().includes(q)
    );
  }

  return vids.sort((a, b) => b.added - a.added);
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const vids = getFilteredVideos();

  grid.className = 'cards-grid-container';

  document.getElementById('sectionCount').textContent = `${vids.length} video${vids.length !== 1 ? 's' : ''}`;

  if (vids.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
        </svg>
        <p>No videos here yet. Paste a YouTube URL above or click <strong>Add Video</strong> to get started.</p>
      </div>`;
    return;
  }

  // Build grouped structure
  // For a specific collection view: group by video.group
  // For all/recent/watched: group by collection first, then by group within
  let html = '';

  if (currentFilter !== 'all' && currentFilter !== 'recent' && currentFilter !== 'watched') {
    // Single collection view — group by video.group
    const col = state.collections.find(c => c.id === currentFilter);
    const colColor = col ? col.color : 'var(--indigo)';
    html += renderGroupedByTitle(vids, currentFilter, colColor);
  } else {
    // Multi-collection view: iterate in sidebar order so drag-reorder is reflected here too
    // Watched view renders all groups expanded so items are immediately visible
    const expanded = currentFilter === 'watched';
    const vidColIds = new Set(vids.map(v => v.collection || '__none__'));
    let isFirstBlock = true;

    // Render in sidebar (state.collections) order
    state.collections.forEach(col => {
      if (!vidColIds.has(col.id)) return;
      const colVids = vids.filter(v => v.collection === col.id);
      if (!colVids.length) return;
      html += buildCollectionBlock(col.id, col.name, col.color, colVids, isFirstBlock, expanded);
      isFirstBlock = false;
    });

    // Uncollected always last
    if (vidColIds.has('__none__')) {
      const uncollected = vids.filter(v => !v.collection);
      if (uncollected.length) {
        html += buildCollectionBlock('__none__', 'Uncollected', 'var(--text-dim)', uncollected, isFirstBlock, expanded);
      }
    }
  }

  grid.innerHTML = html;
  attachCardDrag();
}

function buildCollectionBlock(colId, colName, colColor, colVids, isFirst, expanded = false) {
  const dividerStyle = isFirst
    ? 'margin-bottom:12px;'
    : 'margin-bottom:12px; padding-top:14px; margin-top:2px; border-top:1px solid var(--border-subtle);';
  const chevClass = expanded ? 'group-chevron chev-up' : 'group-chevron collapsed';
  const bodyClass = expanded ? 'group-body' : 'group-body collapsed';
  let html = `<div class="group-section" style="${dividerStyle}">`;
  html += `<div class="group-header group-header--collection" onclick="toggleGroup('col-${colId}')">
    <span class="${chevClass}" id="chev-col-${colId}">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </span>
    <span class="collection-dot" style="background:${colColor};width:9px;height:9px;border-radius:50%;flex-shrink:0;"></span>
    <span class="group-title" style="color:${colColor};">${escHtml(colName)}</span>
    <span class="group-count">${colVids.length}</span>
    <div class="group-header-line group-header-line--collection"></div>
  </div>`;
  html += `<div class="${bodyClass}" id="group-col-${colId}">`;
  html += renderGroupedByTitle(colVids, colId, colColor, true, expanded);
  html += `</div></div>`;
  return html;
}

function renderGroupedByTitle(vids, colId, colColor, nested = false, expanded = false) {
  // Separate grouped vs ungrouped
  const grouped = {};
  const ungrouped = [];

  vids.forEach(v => {
    const g = (v.group || '').trim();
    if (g) {
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(v);
    } else {
      ungrouped.push(v);
    }
  });

  const groupNames = Object.keys(grouped).sort();
  let html = '';

  groupNames.forEach(gName => {
    let gVids = grouped[gName];
    const orderKey = `${colId}__${gName}`.replace(/[^a-z0-9_]/gi, '_');
    const savedOrder = state.videoOrder[orderKey];
    if (savedOrder && savedOrder.length) {
      const orderMap = new Map(savedOrder.map((id, i) => [id, i]));
      gVids = [...gVids].sort((a, b) => {
        const ai = orderMap.has(a.id) ? orderMap.get(a.id) : 9999;
        const bi = orderMap.has(b.id) ? orderMap.get(b.id) : 9999;
        return ai - bi;
      });
    }
    const gKey = `${colId}__${gName}`.replace(/[^a-z0-9_]/gi, '_');
    const gChevClass = expanded ? 'group-chevron chev-up' : 'group-chevron collapsed';
    const gBodyClass = expanded ? 'group-body' : 'group-body collapsed';
    html += `<div class="group-section">
      <div class="group-header" onclick="toggleGroup('${gKey}')">
        <span class="${gChevClass}" id="chev-${gKey}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
        <div class="group-title-wrap">
          <div class="group-title-row">
            <span class="group-title">${escHtml(gName)}</span>
            <span class="group-count">${gVids.length}</span>
            <div class="group-header-line"></div>
          </div>
          <div class="group-header-actions" onclick="event.stopPropagation()">
            <button class="group-action-btn" onclick="openGroupPlaylistPicker(event,'${escAttr(colId)}','${escAttr(gName)}')" title="Add group to playlist">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
            <button class="group-action-btn" onclick="renameGroupPrompt('${escAttr(colId)}','${escAttr(gName)}')" title="Rename group">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="group-action-btn danger" onclick="deleteGroupPrompt('${escAttr(colId)}','${escAttr(gName)}')" title="Delete group">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="${gBodyClass}" id="group-${gKey}">
        <div class="cards-grid${currentView === 'list' ? ' list-view' : ''}">
          ${gVids.map(v => renderCard(v)).join('')}
        </div>
      </div>
    </div>`;
  });

  // Ungrouped videos
  if (ungrouped.length > 0) {
    const ugKey = `${colId}__`.replace(/[^a-z0-9_]/gi, '_');
    const ugOrder = state.videoOrder[ugKey];
    if (ugOrder && ugOrder.length) {
      const ugMap = new Map(ugOrder.map((id, i) => [id, i]));
      ungrouped.sort((a, b) => {
        const ai = ugMap.has(a.id) ? ugMap.get(a.id) : 9999;
        const bi = ugMap.has(b.id) ? ugMap.get(b.id) : 9999;
        return ai - bi;
      });
    }
    if (groupNames.length > 0) {
      html += `<div class="ungrouped-label">Ungrouped</div>`;
    }
    html += `<div class="cards-grid${currentView === 'list' ? ' list-view' : ''}">
      ${ungrouped.map(v => renderCard(v)).join('')}
    </div>`;
  }

  // Add new group button (only in single-collection view)
  if (!nested) {
    html += `<div class="add-group-row" id="addGroupRow-${colId}">
      <button class="add-collection-btn" style="width:auto;padding:5px 12px;" onclick="showAddGroupInput('${escAttr(colId)}')">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New group
      </button>
    </div>
    <div id="newGroupInputRow-${colId}" style="display:none;padding:4px 0;">
      <div style="display:flex;gap:8px;align-items:center;">
        <input class="add-group-input" id="newGroupInput-${colId}" placeholder="Group name (e.g. Physics, AI, Shaders…)"
          onkeydown="if(event.key==='Enter') confirmNewGroup('${escAttr(colId)}'); if(event.key==='Escape') hideAddGroupInput('${escAttr(colId)}')">
        <button class="btn btn-primary" style="padding:5px 12px;font-size:12px;" onclick="confirmNewGroup('${escAttr(colId)}')">Add</button>
        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="hideAddGroupInput('${escAttr(colId)}')">Cancel</button>
      </div>
    </div>`;
  }

  return html;
}

function renderCard(v) {
  const col = state.collections.find(c => c.id === v.collection);
  const isPlaylistView = currentFilter.startsWith('playlist:');
  // In single-collection view, don't show the collection tag — group header handles it
  const showColTag = currentFilter === 'all' || currentFilter === 'recent' || currentFilter === 'watched' || isPlaylistView;
  // Build breadcrumb: Collection / Group
  const colPath = col ? (v.group ? `${col.name} / ${v.group}` : col.name) : (v.collection ? '' : (v.group ? v.group : ''));
  const colTag = (showColTag && colPath) ? `<span class="card-collection-tag" title="${colPath}"><span class="tag-dot" style="background:${col ? col.color : 'var(--text-dim)'}"></span>${colPath}</span>` : '';
  const noteHtml = v.note ? `<div class="card-note" id="note-text-${v.id}">${escHtml(v.note)}</div>` : '';
  const watchedStyle = v.watched ? 'opacity:0.6;' : '';

  return `
<div class="video-card${currentView === 'list' ? ' list-view' : ''}" id="card-${v.id}" style="${watchedStyle}">
  <div class="card-thumb">
    <img src="${getThumbnail(v.videoId)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="card-thumb-placeholder" style="display:none;">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" opacity="0.3">
        <path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.4a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>
      </svg>
    </div>
    <div class="card-play-overlay">
      <a href="${getWatchUrl(v.videoId, v.playlistId)}" target="_blank" class="play-btn" onclick="markWatched('${v.id}')">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </a>
    </div>
  </div>
  <div class="card-body">
    ${colTag}
    <div class="card-title-row">
      <div class="card-title" id="title-${v.id}" onclick="event.stopPropagation();startTitleEdit('${v.id}')" title="Click to edit title">${escHtml(v.title || 'Untitled Video')}</div>
      <button class="card-title-edit-btn" onmousedown="event.stopPropagation();event.preventDefault();startTitleEdit('${v.id}')" title="Edit title">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    ${v.channel ? `<div class="card-channel">${escHtml(v.channel)}</div>` : ''}
    ${noteHtml}
    <textarea class="note-edit" id="note-edit-${v.id}" rows="2" placeholder="Add a note…" onblur="saveNote('${v.id}', this.value)">${escHtml(v.note||'')}</textarea>
    <div class="card-meta">
      <div class="card-actions">
        <button class="card-action-btn" onclick="openMoveGroupModal('${v.id}')" title="Move to group">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
        <button class="card-action-btn" onclick="toggleNote('${v.id}')" title="Edit note">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="card-action-btn" onclick="copyUrl('${v.url}')" title="Copy URL">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
        <button class="card-action-btn" onclick="toggleWatched('${v.id}')" title="${v.watched ? 'Mark unwatched' : 'Mark watched'}">
          <svg width="12" height="12" fill="${v.watched ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="card-action-btn" onclick="openPlaylistPicker('${v.id}', this)" title="Add to playlist">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>

            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        ${isPlaylistView ? `<button class="card-action-btn danger" onclick="removeFromCurrentPlaylist('${v.id}')" title="Remove from playlist">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>` : ''}
        <button class="card-action-btn danger" onclick="deleteVideo('${v.id}')" title="Delete video">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
      <span class="card-date">${formatDate(v.added)}</span>
    </div>
  </div>
</div>`;
}

// ──────────────────────────────────────────────
// GROUP INTERACTIONS
// ──────────────────────────────────────────────
function toggleGroup(key) {
  const body = document.getElementById(`group-${key}`);
  const chev = document.getElementById(`chev-${key}`);
  if (!body) return;
  body.classList.toggle('collapsed');
  chev?.classList.toggle('collapsed');
}

function showAddGroupInput(colId) {
  document.getElementById(`addGroupRow-${colId}`).style.display = 'none';
  const row = document.getElementById(`newGroupInputRow-${colId}`);
  row.style.display = 'block';
  document.getElementById(`newGroupInput-${colId}`)?.focus();
}

function hideAddGroupInput(colId) {
  document.getElementById(`addGroupRow-${colId}`).style.display = 'flex';
  const row = document.getElementById(`newGroupInputRow-${colId}`);
  row.style.display = 'none';
  if (document.getElementById(`newGroupInput-${colId}`))
    document.getElementById(`newGroupInput-${colId}`).value = '';
}

function confirmNewGroup(colId) {
  const input = document.getElementById(`newGroupInput-${colId}`);
  const name = input?.value.trim();
  if (!name) { showToast('⚠️ Enter a group name'); return; }
  // Group is just a label — no video assigned yet; just re-render with the knowledge it exists
  // We store "pending groups" in state so they show even with 0 videos
  if (!state.pendingGroups) state.pendingGroups = {};
  if (!state.pendingGroups[colId]) state.pendingGroups[colId] = [];
  if (!state.pendingGroups[colId].includes(name)) state.pendingGroups[colId].push(name);
  save();
  hideAddGroupInput(colId);
  renderCards();
  showToast(`✓ Group "${name}" created`);
}

function renameGroupPrompt(colId, oldName) {
  const newName = prompt(`Rename group "${oldName}" to:`, oldName);
  if (!newName || newName.trim() === oldName) return;
  state.videos.forEach(v => {
    if (v.collection === colId && v.group === oldName) v.group = newName.trim();
  });
  if (state.pendingGroups?.[colId]) {
    const idx = state.pendingGroups[colId].indexOf(oldName);
    if (idx >= 0) state.pendingGroups[colId][idx] = newName.trim();
  }
  save(); renderCards(); refreshGroupSelect('addCollection','addGroup');
  showToast(`✓ Renamed to "${newName.trim()}"`);
}

function deleteGroupPrompt(colId, groupName) {
  const count = state.videos.filter(v => v.collection === colId && v.group === groupName).length;
  const msg = count > 0
    ? `"${groupName}" and its ${count} video${count !== 1 ? 's' : ''} will be permanently deleted.`
    : `"${groupName}" will be permanently deleted.`;
  showConfirm('Delete Group', msg, 'Delete', () => {
    state.videos = state.videos.filter(v => !(v.collection === colId && v.group === groupName));
    if (state.pendingGroups?.[colId]) {
      state.pendingGroups[colId] = state.pendingGroups[colId].filter(g => g !== groupName);
    }
    save(); renderSidebar(); renderCards();
    showToast(`✓ Group "${groupName}" deleted`);
  });
}

// Move-to-group modal
let moveGroupVideoId = null;
function openMoveGroupModal(videoId) {
  moveGroupVideoId = videoId;
  const v = state.videos.find(v => v.id === videoId);
  if (!v) return;
  const colId = v.collection;
  const groups = getGroupsForCollection(colId);
  const pending = state.pendingGroups?.[colId] || [];
  const allGroups = [...new Set([...groups, ...pending])].sort();

  const sel = document.getElementById('moveGroupSelect');
  sel.innerHTML = '<option value="">— No group (ungrouped) —</option>';
  allGroups.forEach(g => {
    sel.innerHTML += `<option value="${g}"${g === v.group ? ' selected' : ''}>${g}</option>`;
  });
  document.getElementById('moveGroupNewInput').value = '';
  document.getElementById('moveGroupVideoTitle').textContent = v.title || 'Untitled';
  openModal('moveGroupModal');
}

function saveMoveGroup() {
  const v = state.videos.find(v => v.id === moveGroupVideoId);
  if (!v) return;
  const newGroupInput = document.getElementById('moveGroupNewInput').value.trim();
  const selected = document.getElementById('moveGroupSelect').value;
  const finalGroup = newGroupInput || selected;
  v.group = finalGroup;
  if (finalGroup && v.collection) {
    if (!state.pendingGroups) state.pendingGroups = {};
    if (!state.pendingGroups[v.collection]) state.pendingGroups[v.collection] = [];
    if (!state.pendingGroups[v.collection].includes(finalGroup))
      state.pendingGroups[v.collection].push(finalGroup);
  }
  save(); closeModal('moveGroupModal'); renderCards();
  showToast(`✓ Moved to ${finalGroup ? `"${finalGroup}"` : 'ungrouped'}`);
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// ──────────────────────────────────────────────
// ACTIONS
// ──────────────────────────────────────────────
function filterByCollection(id, btn) {
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (id.startsWith('playlist:')) {
    // Open the immersive split-view instead of normal card rendering
    const plId = id.slice(9);
    openPlaylistView(plId);
    return;
  }

  // Normal view — make sure split-view is hidden
  closePvView(false);

  currentFilter = id;
  const titles = { all: 'All Videos', recent: 'Recently Added', watched: 'Watched' };
  const playBtn = document.getElementById('playPlaylistBtn');
  if (titles[id]) {
    document.getElementById('sectionTitle').textContent = titles[id];
    if (playBtn) playBtn.style.display = 'none';
  } else {
    const col = state.collections.find(c => c.id === id);
    document.getElementById('sectionTitle').textContent = col ? col.name : 'Collection';
    if (playBtn) playBtn.style.display = 'none';
  }
  renderCards();
}

function setView(v) {
  currentView = v;
  document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
  renderCards();
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value;
  renderCards();
}

async function quickAdd() {
  const input = document.getElementById('quickAddInput');
  const url = input.value.trim();
  if (!url || !isYouTubeUrl(url)) {
    showToast('⚠️ Please paste a valid YouTube URL');
    return;
  }
  const videoId = extractVideoId(url);
  if (!videoId) { showToast('⚠️ Could not extract video ID'); return; }
  const playlistId = extractPlaylistId(url);

  const colId = state.lastUsedCollection || '';
  const col = state.collections.find(c => c.id === colId);
  const group = state.lastUsedGroup || '';

  addVideo({ url, videoId, playlistId, title: '', channel: '', note: '', collection: colId, group, added: Date.now(), watched: false, id: generateId() });
  input.value = '';
  const path = col ? (group ? `${col.name}/${group}` : col.name) : (group ? `Uncollected/${group}` : 'Uncollected');
  showToast(`✓ Saved to ${path}`);
}

function addVideo(video) {
  state.videos.unshift(video);
  save();
  renderSidebar();
  renderCards();
  // Auto-fetch title if missing (uses noembed.com — no API key needed)
  if (!video.title && video.videoId) {
    fetchVideoTitle(video.id, video.videoId);
  }
}

async function fetchVideoTitle(internalId, youtubeVideoId) {
  try {
    const url = `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${youtubeVideoId}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data && data.title) {
      const v = state.videos.find(v => v.id === internalId);
      if (v) {
        v.title = data.title;
        if (data.author_name) v.channel = data.author_name;
        save();
        // Update the title in DOM without full re-render
        const titleEl = document.getElementById('title-' + internalId);
        if (titleEl && !titleEl.querySelector('input')) {
          titleEl.textContent = v.title;
        }
        // Update channel in DOM if visible
        const cardEl = document.getElementById('card-' + internalId);
        if (cardEl && v.channel) {
          const chEl = cardEl.querySelector('.card-channel');
          if (chEl) chEl.textContent = v.channel;
        }
      }
    }
  } catch (e) {
    // Silent fail — user can edit title manually
  }
}

function deleteVideo(id) {

function startTitleEdit(id) {
  const titleEl = document.getElementById('title-' + id);
  if (!titleEl || titleEl.querySelector('input')) return; // already editing
  const v = state.videos.find(v => v.id === id);
  if (!v) return;
  const current = v.title || '';
  const input = document.createElement('input');
  input.className = 'title-edit-input';
  input.value = current;
  input.placeholder = 'Enter title…';
  input.maxLength = 200;
  titleEl.innerHTML = '';
  titleEl.appendChild(input);
  input.focus();
  input.select();
  let saved = false;
  const save = () => {
    if (saved) return;
    saved = true;
    const newTitle = input.value.trim();
    v.title = newTitle || v.title;
    saveState();
    titleEl.innerHTML = escHtml(v.title || 'Untitled Video');
    if (document.getElementById('pvTracks')) pvRenderList();
  };
  input.addEventListener('blur', save);
  input.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); save(); input.blur(); }
    if (e.key === 'Escape') { saved = true; titleEl.innerHTML = escHtml(v.title || 'Untitled Video'); }
  });
}

function toggleNote(id) {

// Generates a URL/JS-safe id from a collection name (e.g. "Game Design" -> "game-design"),
// ensuring it doesn't collide with an existing collection id.
function slugifyCollectionName(name) {
  let base = name.trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')   // non-alphanumeric -> hyphen
    .replace(/^-+|-+$/g, '');      // trim leading/trailing hyphens
  if (!base) base = 'collection';

  let id = base;
  let n = 2;
  while (state.collections.some(c => c.id === id)) {
    id = `${base}-${n}`;
    n++;
  }
  return id;
}
